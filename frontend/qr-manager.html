<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>QR Code Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: Inter, sans-serif;
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            padding: 20px;
            min-height: 100vh;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .card {
            max-width: 720px;
            margin: auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        select,
        input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 10px;
            border: 1px solid #c7d2fe;
            font-size: 14px;
        }

        button {
            margin-top: 14px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .link {
            margin-top: 10px;
            text-align: center;
            color: #4f46e5;
            cursor: pointer;
            font-weight: 600;
        }

        .qr-list {
            margin-top: 20px;
            border-top: 1px solid #e5e7eb;
            padding-top: 14px;
        }

        .qr-item {
            padding: 10px;
            border-radius: 10px;
            background: #f8fafc;
            margin-bottom: 8px;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .qr-item strong {
            margin-top: 6px;
        }

        .qr-box {
            width: 120px;
            height: 120px;
        }



        /* Popup */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .4);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .overlay.active {
            display: flex;
        }

        .popup {
            position: relative;
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 320px;
        }

        .popup input {
            box-sizing: border-box;
        }


        .close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: transparent;
            border: none;
            font-size: 18px;
            font-weight: 700;
            color: #6b7280;
            cursor: pointer;
        }

        .qr-btn {
            padding: 6px 12px;
            border-radius: 8px;
            color: black;
            border: 1px solid #c7d2fe;
            background: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        /* ---------- Global Loader ---------- */
        #globalLoader {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            /* pointer-events: none; */
        }

        #globalLoader.active {
            display: flex;
        }

        .loader {
            width: 42px;
            height: 42px;
            border: 4px solid #e5e7eb;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ---------- Skeleton ---------- */
        .skeleton {
            height: 60px;
            border-radius: 10px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 37%, #e5e7eb 63%);
            background-size: 400% 100%;
            animation: shimmer 1.2s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 100% 0;
            }

            100% {
                background-position: -100% 0;
            }
        }

        /* ---------- Toast ---------- */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #111827;
            color: white;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            z-index: 10000;
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* PRINT POPUP */

        #printPopup .popup {
            width: 520px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .print-header {
            font-weight: 600;
            font-size: 16px;
        }

        .paper-select {
            display: flex;
            gap: 16px;
        }

        .paper-select label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }

        .print-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .print-toolbar button {
            padding: 6px 10px;
            font-size: 12px;
        }

        #qrPrintList {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-height: 300px;
            overflow: auto;
        }

        .qr-select-card {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: .2s;
            background: #fafafa;
        }

        .qr-select-card:hover {
            background: #f1f5f9;
        }

        .qr-select-card img {
            width: 60px;
            height: 60px;
            margin-bottom: 6px;
        }

        .qr-select-card input {
            margin-bottom: 6px;
        }

        .print-actions {
            display: flex;
            gap: 10px;
        }

        .print-actions button {
            flex: 1;
        }

        .qr-wrapper {
            display: inline-block;
            padding: 10px;
            /* inner padding */
            border-radius: 16px;
            /* rounded corners */
            border: 3px solid #000;
            /* thick border */
            background: white;
        }

        .qr-print-item {
            display: inline-block;
            margin: 0.5cm;
            /* outer spacing (IMPORTANT) */
            position: relative;
        }
    </style>
</head>

<body>

    <div id="globalLoader">
        <div class="loader"></div>
    </div>
    <div id="toast"></div>

    <div class="card">
        <h2>QR Code Manager</h2>

        <select id="clientSelect">
            <option value="">Select client</option>
        </select>

        <div class="link" id="newClientBtn">+ Add new client</div>

        <div id="qrForm" style="display:none;">
            <input id="qrId" placeholder="QR Code ID" />
            <small id="qrIdError" style="color:red;display:none;">
                QR ID already exists
            </small>

            <input id="qrName" placeholder="QR Code Name" />
            <input id="qrUrl" placeholder="QR Code URL" />
            <input type="file" id="qrLogo" accept="image/*" />

            <button id="createQrBtn">Create QR Code</button>
        </div>

        <button id="printSheetBtn">
            Print / Export QR Sheet
        </button>

        <div class="qr-list" id="qrList"></div>
    </div>

    <div class="overlay" id="clientPopup">
        <div class="popup">
            <button class="close-btn" id="closeClientPopup">✕</button>
            <h3 style="margin-bottom:10px;">New Client</h3>
            <input id="clientNameInput" placeholder="Client name" />
            <button id="createClientBtn">Create</button>
        </div>
    </div>

    <div class="overlay" id="editQrPopup">
        <div class="popup">
            <button class="close-btn" id="closeEditQrPopup">✕</button>
            <h3 style="margin-bottom:10px;">Edit QR Code</h3>

            <input id="editQrId" placeholder="QR Code ID" />
            <input id="editQrName" placeholder="QR Code Name" />
            <input id="editQrUrl" placeholder="QR Code URL" />
            <input type="file" id="editQrLogo" placeholder="Logo" accept="image/*" />


            <button id="saveEditQrBtn">Save Changes</button>
        </div>
    </div>

    <div class="overlay" id="printPopup">
        <div class="popup">

            <button class="close-btn" id="closePrintPopup">✕</button>

            <div class="print-header">
                Print / Export QR Sheet
            </div>

            <div class="paper-select">
                <label>
                    <input type="radio" name="paperSize" value="A4" checked>
                    A4
                </label>

                <label>
                    <input type="radio" name="paperSize" value="A3">
                    A3
                </label>
            </div>

            <div class="print-toolbar">
                <button id="selectAllBtn">Select All</button>
                <button id="clearAllBtn">Clear</button>

                <span id="selectedCount">0 selected</span>
            </div>

            <div id="qrPrintList"></div>

            <div class="print-actions">
                <button id="generatePrintBtn">
                    Open Print Layout
                </button>

                <button id="downloadPdfBtn">
                    Download PDF
                </button>
            </div>

        </div>
    </div>

    <!-- <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script> -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script> -->
    <script src="config.js"></script>
    <script src="state.js"></script>
    <script src="utils.js"></script>
    <script src="api.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>



    <script>
        const clientSelect = document.getElementById("clientSelect");
        const qrList = document.getElementById("qrList");
        const qrForm = document.getElementById("qrForm");
        let availableQrs = [];

        const showLoader = () => document.getElementById("globalLoader").classList.add("active");
        const hideLoader = () => document.getElementById("globalLoader").classList.remove("active");
        const showToast = (msg) => {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 2000);
        };

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                if (!file) return resolve(null);
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function renderQr(qrBox, url, logoFile) {

            qrBox.innerHTML = "";
            qrBox.style.position = "relative";

            try {
                const blob = await generateCustomQrImage(url, "#000000", logoFile);

                const imgUrl = URL.createObjectURL(blob);

                const img = document.createElement("img");
                img.src = imgUrl;
                img.style.width = "120px";
                img.style.height = "120px";

                qrBox.appendChild(img);

            } catch (err) {
                console.error("QR render failed", err);
            }
        }

        async function loadClients() {
            showLoader();
            const clients = await fetchClients();
            clientSelect.innerHTML = `<option value="">Select client</option>`;
            clients.forEach(c => {
                const opt = document.createElement("option");
                opt.value = c.client_id;
                opt.textContent = c.client_name;
                clientSelect.appendChild(opt);
            });
            hideLoader();
        }

        clientSelect.onchange = async () => {
            const clientId = clientSelect.value;
            qrForm.style.display = clientId ? "block" : "none";

            qrIdError.style.display = "none";
            document.getElementById("createQrBtn").disabled = false;
            qrIdInput.value = "";


            qrList.innerHTML = `
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            `;

            if (!clientId) return;

            const qrs = await fetchQrCodes(clientId);
            qrList.innerHTML = "";
            availableQrs = [];

            const activeQrs = qrs.slice(1).filter(q => q.qr_status === 1);

            if (!activeQrs.length) {
                qrList.innerHTML = `
                    <div style="text-align:center;color:#6b7280;">
                        No QR Codes created for this client
                    </div>
                `;
                return;
            }

            activeQrs.forEach(q => {
                const div = document.createElement("div");
                div.className = "qr-item";

                div.innerHTML = `
                    <strong>${q.qr_name}</strong>
                    <small>ID: ${q.qr_id}</small>
                `;


                const qrBox = document.createElement("div");
                qrBox.style.marginTop = "10px";
                qrBox.className = "qr-box";
                div.appendChild(qrBox);

                availableQrs.push(q);

                const actions = document.createElement("div");
                actions.style.display = "flex";
                actions.style.gap = "8px";
                actions.style.justifyContent = "center";
                actions.innerHTML = `
                    <button class="qr-btn" data-url="${q.qr_url}">Copy URL</button>
                    <button class="qr-btn" data-edit='${JSON.stringify(q)}'>Edit</button>
                    <button class="qr-btn"
                            data-download
                            data-url="${q.qr_url}"
                            data-logo="${q.qr_logo || ''}">
                        Download
                    </button>
                    <button class="qr-btn" data-disable="${q.qr_id}">Disable</button>
                `;
                div.appendChild(actions);

                qrList.appendChild(div);

                // renderQr(qrBox, q.qr_url, q.qr_logo);
                // renderQr(qrBox, q.qr_url, null);
                if (q.qr_image) {
                    const img = document.createElement("img");
                    img.src = q.qr_image;
                    img.style.width = "120px";
                    img.style.height = "120px";
                    qrBox.appendChild(img);
                }

            });
        };

        const qrIdInput = document.getElementById("qrId");
        const qrIdError = document.getElementById("qrIdError");

        let lastCheckedQrId = null;

        qrIdInput.addEventListener("blur", async () => {
            const qrId = Number(qrIdInput.value);
            const clientId = clientSelect.value;

            if (!qrId || !clientId) return;

            lastCheckedQrId = qrId;

            const clientName = clientSelect.options[clientSelect.selectedIndex].text;
            //const dbId = await fetchDbId(clientName);

            //const coll_name = await todayCollectionName();

            const exists = await checkQrIdExists(clientName, qrId);

            if (qrId !== lastCheckedQrId) return;

            if (exists) {
                qrIdError.style.display = "block";
                document.getElementById("createQrBtn").disabled = true;
            } else {
                qrIdError.style.display = "none";
                document.getElementById("createQrBtn").disabled = false;
            }
        });



        document.addEventListener("click", async e => {

            if (e.target.hasAttribute("data-download")) {

                const qrItem = e.target.closest(".qr-item");
                const img = qrItem?.querySelector("img");

                if (!img || !img.src) {
                    showToast("No QR image found");
                    return;
                }

                const a = document.createElement("a");
                a.href = img.src;
                a.download = "qr-code.png";
                a.click();

                return; // ⛔ stop further execution
            }

            if (e.target.dataset.url) {
                await navigator.clipboard.writeText(e.target.dataset.url);
                showToast("URL copied");
            }


            if (e.target.dataset.disable) {
                if (!confirm("Disable this QR code?")) return;
                const btn = e.target;
                btn.disabled = true;
                btn.textContent = "Disabling…";
                await disableQrCode(clientSelect.value, Number(btn.dataset.disable));
                showToast("QR code disabled");
                clientSelect.onchange();
            }

            if (e.target.dataset.edit) {
                editingQr = JSON.parse(e.target.dataset.edit);

                document.getElementById("editQrId").value = editingQr.qr_id;
                document.getElementById("editQrName").value = editingQr.qr_name;
                document.getElementById("editQrUrl").value = editingQr.qr_url.split("?")[0];

                document.getElementById("editQrPopup").classList.add("active");
            }

        });

        document.getElementById("createQrBtn").onclick = async () => {
            const btn = document.getElementById("createQrBtn");
            const qrId = document.getElementById("qrId").value.trim();
            const qrName = document.getElementById("qrName").value.trim();
            const qrUrl = document.getElementById("qrUrl").value.trim();
            const cleanBaseUrl = normalizeUrl(qrUrl);

            if (!qrId) return showToast("Enter QR ID");
            if (!qrName) return showToast("Enter QR Name");
            if (!qrUrl) return showToast("Enter QR URL");

            const logoFile = document.getElementById("qrLogo").files[0];
            const logoBase64 = await fileToBase64(logoFile);

            btn.disabled = true;
            showLoader();

            try {
                const clientName = clientSelect.options[clientSelect.selectedIndex].text;
                const timestamp = new Date().toISOString();
                const [date, t] = timestamp.split("T");
                const time = t.replace("Z", "").split(".")[0];
                const dbId = await fetchDbId(clientName);

                const VERIFY_PAGE = "https://location-map-1.onrender.com/survey.html";

                // 1. Build alias-based URL — returns { url, alias, token }
                const { url: encryptedQrUrl, alias: qrAlias } = await buildEncryptedQrUrl(
                    VERIFY_PAGE, cleanBaseUrl, dbId, qrId
                );

                // 2. Generate QR image using the alias URL
                const qrBlob = await generateCustomQrImage(encryptedQrUrl, "#000000", logoFile);
                const qrImageBase64 = await blobToBase64(qrBlob);

                // 3. Save to DB — single call with all data ready
                await createQrCode(
                    clientSelect.value, qrId, qrName, encryptedQrUrl,
                    clientName, date, time, dbId, logoBase64, qrImageBase64,
                    qrAlias
                );

                document.getElementById("qrId").value = "";
                document.getElementById("qrName").value = "";
                document.getElementById("qrUrl").value = "";
                document.getElementById("qrLogo").value = "";

                showToast("QR Code created");
                clientSelect.onchange();

            } catch (err) {
                console.error("Create QR failed:", err);
                showToast("Failed to generate secure QR URL");
            } finally {
                hideLoader();
                btn.disabled = false;
            }
        };

        document.getElementById("closeEditQrPopup").onclick = () => {
            document.getElementById("editQrPopup").classList.remove("active");
            editingQr = null;
        };

        document.getElementById("saveEditQrBtn").onclick = async () => {
            if (!editingQr) return;

            const btn = document.getElementById("saveEditQrBtn");
            btn.disabled = true;
            showLoader();

            try {
                const clientName = clientSelect.options[clientSelect.selectedIndex].text;
                const timestamp = new Date().toISOString();
                const [date, t] = timestamp.split("T");
                const time = t.replace("Z", "").split(".")[0];
                const dbId = await fetchDbId(clientName);

                const logoFile = document.getElementById("editQrLogo").files[0];
                const logoBase64 = logoFile ? await fileToBase64(logoFile) : editingQr.qr_logo;
                const cleanBaseUrl = normalizeUrl(document.getElementById("editQrUrl").value);
                const newQrId = Number(document.getElementById("editQrId").value);
                const newQrName = document.getElementById("editQrName").value.trim();

                if (!newQrId || !newQrName || !cleanBaseUrl) {
                    return showToast("All fields required");
                }

                if (newQrId !== editingQr.qr_id) {
                    const exists = await checkQrIdExists(clientName, newQrId);
                    if (exists) {
                        showToast("QR ID already exists");
                        return;
                    }
                }

                // 1. Update alias record — keeps same alias, re-encrypts
                const { token, alias } = await updateQrToken(
                    editingQr.qr_alias, cleanBaseUrl, dbId, newQrId
                );

                // 2. Rebuild the short alias URL (alias unchanged)
                const VERIFY_PAGE = "https://location-map-1.onrender.com/survey.html";
                const encryptedQrUrl = `${VERIFY_PAGE}?alias=${editingQr.qr_alias}`;

                // 3. Regenerate QR image
                const qrBlob = await generateCustomQrImage(encryptedQrUrl, "#000000", logoFile || null);
                const qrImageBase64 = await blobToBase64(qrBlob);

                // 4. Update QR record in DB
                await updateQrCode({
                    old_qr_id: editingQr.qr_id,
                    new_qr_id: newQrId,
                    qr_name: newQrName,
                    qr_url: encryptedQrUrl,
                    qr_logo: logoBase64,
                    qr_image: qrImageBase64,
                    client_name: clientName,
                    db_id: dbId,
                    date, time
                });

                showToast("QR updated");
                document.getElementById("editQrPopup").classList.remove("active");
                editingQr = null;
                clientSelect.onchange();

            } catch (err) {
                console.error("Edit QR failed:", err);
                showToast("Failed to update QR code");
            } finally {
                hideLoader();
                btn.disabled = false;
            }
        };



        document.getElementById("newClientBtn").onclick = () =>
            document.getElementById("clientPopup").classList.add("active");

        document.getElementById("closeClientPopup").onclick = () =>
            document.getElementById("clientPopup").classList.remove("active");

        document.getElementById("createClientBtn").onclick = async () => {
            const btn = document.getElementById("createClientBtn");
            const name = document.getElementById("clientNameInput").value.trim();
            if (!name) return showToast("Enter client name");

            btn.disabled = true;
            showLoader();

            const timestamp = new Date().toISOString();
            const [date, t] = timestamp.split("T");
            const time = t.replace("Z", "").split(".")[0];

            const res = await createClient(name);
            const dbId = res.database.id;

            await registerClient(dbId, name);
            await addDbId(dbId, name, date, time);

            btn.disabled = false;
            hideLoader();
            showToast("Client created");
            document.getElementById("clientPopup").classList.remove("active");
            document.getElementById("clientNameInput").value = "";
            loadClients();
        };

        document.getElementById("printSheetBtn").onclick = () => {

            const list = document.getElementById("qrPrintList");
            list.innerHTML = "";

            availableQrs.forEach(q => {

                const card = document.createElement("label");
                card.className = "qr-select-card";

                card.innerHTML = `
                    <input type="checkbox" value="${q.qr_image}">
                    <img src="${q.qr_image}">
                    <div>${q.qr_id}</div>
                    `;

                list.appendChild(card);

            });

            updateSelectedCount();

            document.getElementById("printPopup").classList.add("active");

        };

        document.getElementById("selectAllBtn").onclick = () => {

            document
                .querySelectorAll("#qrPrintList input")
                .forEach(cb => cb.checked = true);

            updateSelectedCount();

        };

        document.getElementById("clearAllBtn").onclick = () => {

            document
                .querySelectorAll("#qrPrintList input")
                .forEach(cb => cb.checked = false);

            updateSelectedCount();

        };

        document.getElementById("closePrintPopup").onclick = () => {
            document.getElementById("printPopup").classList.remove("active");
        };

        function updateSelectedCount() {

            const count = document.querySelectorAll(
                "#qrPrintList input:checked"
            ).length;

            document.getElementById("selectedCount").textContent =
                count + " selected";

        }

        document.addEventListener("change", e => {

            if (e.target.closest("#qrPrintList")) {
                updateSelectedCount();
            }

        });

        document.getElementById("generatePrintBtn").onclick = () => {

            const images = getSelectedQrImages();

            if (!images.length) {
                showToast("Select QR codes");
                return;
            }

            const paper = document.querySelector("input[name=paperSize]:checked").value;

            openPrintLayout(images, paper);

        };

        document.getElementById("downloadPdfBtn").onclick = async () => {

            const selected = [];

            document.querySelectorAll("#qrPrintList input:checked").forEach(cb => {
                const card = cb.closest(".qr-select-card");
                const img = card.querySelector("img").src;
                const name = card.querySelector("div").textContent;
                selected.push({ img, name });
            });

            if (!selected.length) {
                showToast("Select QR codes");
                return;
            }

            const paper = document.querySelector("input[name=paperSize]:checked").value;

            const { jsPDF } = window.jspdf;

            const pdf = new jsPDF({
                orientation: "portrait",
                unit: "cm",
                format: paper
            });

            const pageWidth = paper === "A4" ? 21 : 29.7;
            const pageHeight = paper === "A4" ? 29.7 : 42;

            // ---- CONFIG ----
            const qrSize = 2.2;
            const padding = 0.2;
            const labelHeight = 0.3;

            const cellWidth = qrSize + padding * 2;
            const cellHeight = qrSize + padding * 2 + labelHeight;

            const gap = 0.2;
            const margin = 0.5;

            // ---- GRID CALC ----
            const cols = Math.floor((pageWidth - margin * 2 + gap) / (cellWidth + gap));
            const rows = Math.floor((pageHeight - margin * 2 + gap) / (cellHeight + gap));

            const gridWidth = cols * cellWidth + (cols - 1) * gap;
            const gridHeight = rows * cellHeight + (rows - 1) * gap;

            const startX = margin;
            const startY = margin;

            let index = 0;

            while (index < selected.length) {

                // =========================
                // DRAW GRID (ONCE PER PAGE)
                // =========================
                pdf.setDrawColor(180);
                pdf.setLineWidth(0.02);
                pdf.setLineDash([0.05, 0.05]);

                // Vertical lines
                for (let c = 0; c <= cols; c++) {
                    const x = startX + c * (cellWidth + gap) - gap / 2;

                    pdf.line(
                        x,
                        startY - gap / 2,
                        x,
                        startY + gridHeight + gap / 2
                    );
                }

                // Horizontal lines
                for (let r = 0; r <= rows; r++) {
                    const y = startY + r * (cellHeight + gap) - gap / 2;

                    pdf.line(
                        startX - gap / 2,
                        y,
                        startX + gridWidth + gap / 2,
                        y
                    );
                }

                pdf.setLineDash([]);

                // =========================
                // PLACE QR CODES
                // =========================
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {

                        if (index >= selected.length) break;

                        const item = selected[index];

                        const x = startX + c * (cellWidth + gap);
                        const y = startY + r * (cellHeight + gap);

                        // 🔴 Optional border (keep or remove)
                        pdf.setDrawColor(255, 0, 0);
                        pdf.setLineWidth(0.05);
                        pdf.rect(x, y, cellWidth, cellHeight);

                        // QR image
                        pdf.addImage(
                            item.img,
                            "PNG",
                            x + padding,
                            y + padding,
                            qrSize,
                            qrSize,
                            undefined,
                            "NONE"
                        );

                        // Label
                        pdf.setTextColor(0);
                        pdf.setFontSize(8);
                        pdf.text(
                            item.name,
                            x + cellWidth / 2,
                            y + cellHeight - 0.25,
                            { align: "center" }
                        );

                        index++;
                    }
                }

                // New page if items remain
                if (index < selected.length) {
                    pdf.addPage();
                }
            }

            pdf.save("qr-sheet.pdf");
        };

        loadClients();
    </script>
</body>

</html>
